<div
  id="card"
  class="w-full max-w-md p-8 bg-white/10 backdrop-blur-xl border border-white/20 rounded-3xl text-white relative transition-shadow duration-300"
>
  <!-- header -->
  <div class="relative w-full max-w-md mx-auto mb-8">
    <div class="absolute inset-y-0 left-0 flex items-center pl-4">
      <button class="cursor-pointer" (click)="getWeather(cityInput.value)">
        <svg class="w-5 h-5 text-white/70" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
          ></path>
        </svg>
      </button>
    </div>
    <input
      type="text"
      class="block w-full p-3 pl-12 text-white placeholder-white/60 bg-white/10 border border-white/20 rounded-full backdrop-blur-lg focus:outline-none focus:ring-2 focus:ring-white/40 transition-all"
      placeholder="Search city..."
      (keyup.enter)="getWeather(cityInput.value)"
      (keyup.enter)="cityInput.value = ''"
      #cityInput
    />
  </div>
  <header class="flex items-center justify-between mb-6">
    <h1 id="city" class="text-3xl font-bold">{{ data().location.name }}</h1>
    <span class="inline-flex items-center space-x-2">
      <span id="live-indicator" class="w-3 h-3 bg-red-500 rounded-full animate-pulse"></span>
      <span class="text-sm uppercase tracking-wide">Live</span>
    </span>
  </header>

  <!-- hero -->
  <section class="flex items-center justify-center space-x-4 mb-8">
    <div id="temp" class="text-8xl font-extrabold">{{ data().current.temp_c }}°C</div>
    <img
      id="icon"
      [src]="'https:' + data().current.condition.icon"
      alt="weather icon"
      class="w-20 h-20"
    />
  </section>

  <p id="condition" class="text-center text-xl mb-8">{{ data().current.condition.text }}</p>

  <!-- stats grid -->
  <div class="grid grid-cols-2 gap-4">
    <div
      class="p-4 bg-white/10 rounded-2xl flex flex-col items-center hover:bg-white/20 transition-colors duration-200"
    >
      <i data-lucide="droplet" class="w-6 h-6 mb-1"></i>
      <span class="text-sm">Humidity</span>
      <span id="humidity" class="text-lg font-semibold">{{ data().current.humidity }}%</span>
    </div>
    <div
      class="p-4 bg-white/10 rounded-2xl flex flex-col items-center hover:bg-white/20 transition-colors duration-200"
    >
      <i data-lucide="wind" class="w-6 h-6 mb-1"></i>
      <span class="text-sm">Wind</span>
      <span id="wind" class="text-lg font-semibold">{{ data().current.wind_kph }} km/h</span>
    </div>
    <div
      class="p-4 bg-white/10 rounded-2xl flex flex-col items-center hover:bg-white/20 transition-colors duration-200"
    >
      <i data-lucide="thermometer" class="w-6 h-6 mb-1"></i>
      <span class="text-sm">Feels Like</span>
      <span id="feels" class="text-lg font-semibold">{{ data().current.feelslike_c }}°C</span>
    </div>
    <div
      class="p-4 bg-white/10 rounded-2xl flex flex-col items-center hover:bg-white/20 transition-colors duration-200"
    >
      <i data-lucide="sun" class="w-6 h-6 mb-1"></i>
      <span class="text-sm">UV Index</span>
      <span id="uv" class="text-lg font-semibold">{{ data().current.uv }}</span>
    </div>
  </div>
</div>
